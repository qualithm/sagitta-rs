name: Sync Branches

on:
    push:
        branches: [ main, test ]
    workflow_dispatch: {}

concurrency:
    group: sync-${{ github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: write
    issues: write

jobs:
    sync:
        name: Sync downstream branches
        runs-on: ubuntu-24.04
        steps:
            - name: Generate GitHub App token
              id: app-token
              uses: actions/create-github-app-token@v1
              with:
                  app-id: ${{ secrets.GH_APP_ID }}
                  private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ steps.app-token.outputs.token }}

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"

            # When main is updated: reset test to main, rebase development onto main.
            - name: Reset test to main
              if: github.ref_name == 'main'
              run: |
                  git checkout test
                  git reset --hard origin/main
                  git push --force-with-lease origin test

            - name: Rebase development onto main
              if: github.ref_name == 'main'
              id: rebase-dev-main
              continue-on-error: true
              run: |
                  git checkout development
                  git rebase origin/main
                  git push --force-with-lease origin development

            # When test is updated: rebase development onto test.
            - name: Rebase development onto test
              if: github.ref_name == 'test'
              id: rebase-dev-test
              continue-on-error: true
              run: |
                  git checkout development
                  git rebase origin/test
                  git push --force-with-lease origin development

            - name: Open issue on rebase conflict
              if: |
                  steps.rebase-dev-main.outcome == 'failure' ||
                  steps.rebase-dev-test.outcome == 'failure'
              uses: actions/github-script@v7
              with:
                  script: |
                      const base = context.ref.replace('refs/heads/', '');
                      await github.rest.issues.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: `Sync failed: development could not be rebased onto ${base}`,
                        body: [
                          `The automated branch sync failed because \`development\` could not be cleanly rebased onto \`${base}\`.`,
                          '',
                          '**Action required:** manually rebase and force-push \`development\`:',
                          '```bash',
                          `git fetch origin`,
                          `git checkout development`,
                          `git rebase origin/${base}`,
                          '# resolve any conflicts, then:',
                          `git push --force-with-lease origin development`,
                          '```',
                          '',
                          `Triggered by push to \`${base}\` — commit: ${context.sha}`,
                        ].join('\n'),
                        labels: ['branch-sync'],
                      });

            - name: Fail if rebase did not succeed
              if: |
                  steps.rebase-dev-main.outcome == 'failure' ||
                  steps.rebase-dev-test.outcome == 'failure'
              run: exit 1
