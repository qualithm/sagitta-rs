name: Sync Branches

on:
  push:
    branches: [main, test]
  workflow_dispatch: {}

concurrency:
  group: sync-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Sync downstream branches
    runs-on: ubuntu-24.04
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Keep test branch ancestry aligned with main to avoid cumulative merge commits.
      - name: Reset test to main
        if: github.ref_name == 'main'
        run: |
          git checkout test
          git reset --hard origin/main
          git push --force-with-lease origin test

      - name: Reset development to main
        if: github.ref_name == 'main'
        run: |
          git checkout development
          if git diff --quiet origin/main origin/development; then
            echo "development already matches main — skipping (avoids hash-only force push)"
          else
            echo "development differs from main — skipping reset to preserve in-progress work"
          fi

      # When test is updated: align development to test only if content differs.
      - name: Reset development to test
        if: github.ref_name == 'test'
        run: |
          git checkout development
          if git diff --quiet origin/test origin/development; then
            echo "development already matches test — skipping (avoids hash-only force push)"
          else
            echo "development differs from test — skipping reset to preserve in-progress work"
          fi
