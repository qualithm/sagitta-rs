# Generated by dx/scripts/branch-sync from ci-templates/sync-branches.yaml.
# Do not edit directly — change the template and re-run branch-sync.

name: Sync Branches

on:
  push:
    branches: [main, test]
  workflow_dispatch: {}

concurrency:
  group: sync-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    name: Sync downstream branches
    runs-on: ubuntu-24.04
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Keep test branch ancestry aligned with main to avoid cumulative merge commits.
      - name: Reset test to main
        if: github.ref_name == 'main'
        run: |
          git checkout test
          git reset --hard origin/main
          git push --force-with-lease origin test

      - name: Realign development onto main
        if: github.ref_name == 'main'
        run: |
          git checkout development
          before=$(git rev-parse development)
          if git rebase origin/main; then
            # Commits already in main (e.g. via squash) drop out as patch-equivalent,
            # so development's base stops rotting while genuinely-new work is preserved.
            if [ "$before" = "$(git rev-parse development)" ]; then
              echo "development already aligned with main — nothing to push"
            else
              git push --force-with-lease origin development
              echo "development realigned onto main"
            fi
          else
            git rebase --abort
            echo "development conflicts with main — left untouched for manual resolution"
          fi

      # When test advances, realign development onto it so its base does not rot.
      - name: Realign development onto test
        if: github.ref_name == 'test'
        run: |
          git checkout development
          before=$(git rev-parse development)
          if git rebase origin/test; then
            # Commits already in test (e.g. via squash) drop out as patch-equivalent,
            # so development's base stops rotting while genuinely-new work is preserved.
            if [ "$before" = "$(git rev-parse development)" ]; then
              echo "development already aligned with test — nothing to push"
            else
              git push --force-with-lease origin development
              echo "development realigned onto test"
            fi
          else
            git rebase --abort
            echo "development conflicts with test — left untouched for manual resolution"
          fi
