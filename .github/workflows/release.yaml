name: Release

on:
  push:
    tags: ["*.*.*"]
  workflow_dispatch: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  IMAGE: ghcr.io/${{ github.repository }}
  BINARY_NAME: sagitta

jobs:
  build-binaries:
    name: Build Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Use ubuntu-24.04 (GLIBC 2.39) for compatibility with debian:trixie-slim (GLIBC 2.41)
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact: linux-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-${{ matrix.os }}-${{ matrix.target }}"

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --target ${{ matrix.target }} --package ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.artifact }}
          path: target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          retention-days: 1

  docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    needs: build-binaries
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-amd64
          path: binaries/linux/amd64

      - name: Download arm64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ env.BINARY_NAME }}-linux-arm64
          path: binaries/linux/arm64

      - name: Make binaries executable
        run: chmod +x binaries/linux/*/${{ env.BINARY_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=${{ env.BINARY_NAME }}
            org.opencontainers.image.description=${{ github.event.repository.description }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: docker/Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BINARY_NAME=${{ env.BINARY_NAME }}

      - name: Test image runs
        run: |
          docker run --rm ${{ env.IMAGE }}:sha-${GITHUB_SHA::7} --help || echo "Binary executed (may exit non-zero without config)"

      - name: Test image health
        run: |
          docker run --rm --entrypoint /bin/sh ${{ env.IMAGE }}:sha-${GITHUB_SHA::7} -c "test -x /usr/local/bin/${{ env.BINARY_NAME }}"

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-24.04
    environment:
      name: crates-io
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "release-publish"

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth

      - name: Check if version exists on crates.io
        id: version_check
        run: |
          set -euo pipefail
          CRATE_NAME=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ env.BINARY_NAME }}") | .name')
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "${{ env.BINARY_NAME }}") | .version')
          echo "crate=$CRATE_NAME@$CRATE_VERSION" >> $GITHUB_OUTPUT

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "User-Agent: github-actions/${{ github.repository }}" "https://crates.io/api/v1/crates/$CRATE_NAME/$CRATE_VERSION")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::$CRATE_NAME@$CRATE_VERSION already published, skipping"
          elif [ "$HTTP_STATUS" = "404" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::notice::$CRATE_NAME@$CRATE_VERSION not found, will publish"
          else
            echo "::error::Unexpected HTTP status $HTTP_STATUS from crates.io API"
            exit 1
          fi

      - name: Publish to crates.io
        if: steps.version_check.outputs.exists == 'false'
        run: cargo publish --package ${{ env.BINARY_NAME }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
