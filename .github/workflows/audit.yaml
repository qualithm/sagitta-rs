# Generated by dx/scripts/audit-sync from ci-templates/audit-rust.yaml.
# Do not edit directly — change the template and re-run audit-sync.

name: Security Audit

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Security Advisory Check
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: RustSec audit
        id: scan
        continue-on-error: true
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: RustSec found an advisory"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: RustSec found an advisory"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1

  deny:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo-deny
        id: scan
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@6c8f9facfa5047ec02d8485b6bf52b587b7777d1 # v2.0.18
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: cargo-deny flagged a policy violation"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: cargo-deny flagged a policy violation"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1

  udeps:
    name: Unused Dependencies
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
      - name: Cache dependencies
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "udeps"
      - name: Install cargo-udeps
        run: cargo install cargo-udeps --locked
      - name: Check unused dependencies
        id: scan
        continue-on-error: true
        run: cargo +nightly udeps --workspace
      - name: Report failure
        if: steps.scan.outcome == 'failure'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: report
          title: "${{ github.event.repository.name }}: cargo-udeps found unused dependencies"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve stale failure issue
        if: steps.scan.outcome == 'success'
        uses: ./.github/actions/report-scan-failure
        with:
          mode: resolve
          title: "${{ github.event.repository.name }}: cargo-udeps found unused dependencies"
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Fail job if the scan failed
        if: steps.scan.outcome == 'failure'
        run: exit 1
