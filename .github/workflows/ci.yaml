# Generated by dx/scripts/ci-sync from ci-templates/rust-lib.yaml.
# Do not edit directly — change the template and re-run ci-sync.

name: CI

on:
  pull_request:
    branches: [main, test]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      code: ${{ steps.f.outputs.code }}
      is-main: ${{ steps.tier.outputs.is-main }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: f
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!.githooks/**'
              - '!.vscode/**'
              - '!docker/**'
              - '!justfile'
              - '!scripts/**'
              - '!LICENSE'
      - id: tier
        run: |
          if [[ "${{ github.base_ref }}" == "main" || "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "is-main=true" >> "$GITHUB_OUTPUT"
          else
            echo "is-main=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build
    needs: changes
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - run: cargo fmt --all -- --check
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    needs: [changes, build]
    if: needs.changes.outputs.code == 'true' && github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - run: cargo test --workspace

  coverage:
    name: Coverage
    needs: [changes, build]
    if:
      needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' &&
      needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - name: Enforce coverage threshold (>=80%)
        run: |
          awk '/^LF:/ {lf+=substr($0,4)} /^LH:/ {lh+=substr($0,4)} END {
            if (lf == 0) { print "No LF records in lcov.info"; exit 1 }
            pct = (lh / lf) * 100
            printf "Line coverage: %.2f%% (%d/%d)\n", pct, lh, lf
            if (pct + 0 < 80) { print "Coverage below 80% threshold"; exit 1 }
          }' lcov.info
      - if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 14

  doc:
    name: Documentation
    needs: [changes, build]
    if:
      needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' &&
      needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: "-Dwarnings"

  benchmark-regression:
    name: Benchmark Regression Check
    needs: [changes, build]
    if:
      needs.changes.outputs.code == 'true' && github.event_name == 'pull_request' &&
      needs.changes.outputs.is-main == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - name: Restore baseline from main
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}
      - name: Run benchmarks and compare against baseline
        run: |
          cargo bench --workspace --bench '*' -- --baseline main 2>&1 | tee benchmark-comparison.txt
          if grep -E "Performance has regressed" benchmark-comparison.txt; then
            echo "::warning::Performance regression detected - review benchmark results"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-comparison
          path: benchmark-comparison.txt
          retention-days: 14

  benchmarks:
    name: Benchmark Baseline
    needs: [changes, build]
    if:
      needs.changes.outputs.code == 'true' && github.event_name == 'push' && github.ref ==
      'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: "build"
      - name: Download baseline
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}
          restore-keys: |
            benchmark-baseline-${{ runner.os }}
      - run: cargo bench --workspace --bench '*' -- --save-baseline main
      - uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: target/criterion
          key: benchmark-baseline-${{ runner.os }}-${{ github.sha }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: |
            target/criterion
            benchmarks/report-*.md
          retention-days: 30

  ci-required:
    name: CI Required
    if: always()
    needs: [changes, build, test, coverage, doc, benchmark-regression, benchmarks]
    runs-on: ubuntu-24.04
    steps:
      - name: Verify dependent jobs
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          echo "$NEEDS"
          echo "$NEEDS" | jq -e '[.[] | .result] | all(. == "success" or . == "skipped")' \
            || { echo "::error::One or more required jobs failed or were cancelled"; exit 1; }
